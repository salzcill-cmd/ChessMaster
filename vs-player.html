<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChessMaster Arena - Vs Player</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  
  <style>
    :root {
      --bg-dark:#0a0f1f; --bg-card:rgba(26,31,53,0.7); --gold:#FFD700; --gold-hover:#e6c200;
      --white:#ffffff; --text-gray:#b0b8d1; --glass-border:rgba(255,215,0,0.2);
      --square-light:#f0d9b5; --square-dark:#b58863; --highlight:rgba(255,215,0,0.4);
      --valid-move:rgba(100,200,100,0.5); --last-move:rgba(255,215,0,0.25);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Poppins',sans-serif; background:linear-gradient(135deg,var(--bg-dark),#1a1f35);
      color:var(--white); min-height:100vh; position:relative; overflow-x:hidden; padding-top:70px;
    }
    body::before{
      content:""; position:fixed; top:0; left:0; width:100%; height:100%;
      background-image:radial-gradient(rgba(255,215,0,0.03) 1px,transparent 1px),
      radial-gradient(rgba(255,255,255,0.02) 1px,transparent 1px);
      background-size:50px 50px,30px 30px; background-position:0 0,15px 15px;
      pointer-events:none; z-index:-1;
    }
    .glass{
      background:var(--bg-card); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      border:1px solid var(--glass-border); border-radius:16px;
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
    }
    .navbar{padding:1rem 2rem; transition:all 0.3s ease; position:fixed; width:100%; top:0; z-index:1000}
    .navbar.scrolled{background:rgba(10,15,31,0.95); backdrop-filter:blur(10px); box-shadow:0 4px 20px rgba(0,0,0,0.3)}
    .navbar-brand{font-weight:700; font-size:1.5rem; color:var(--gold)!important; display:flex; align-items:center; gap:0.5rem}
    .navbar-brand i{font-size:1.8rem}
    .nav-link{color:var(--text-gray)!important; font-weight:500; margin:0 0.3rem; padding:0.5rem 1rem!important; border-radius:8px; transition:all 0.3s ease}
    .nav-link:hover,.nav-link.active{color:var(--gold)!important; background:rgba(255,215,0,0.1)}
    
    .game-container{display:flex; flex-wrap:wrap; justify-content:center; align-items:flex-start; gap:2rem; padding:2rem; max-width:1400px; margin:0 auto}
    .board-section{flex:1; min-width:300px; max-width:600px; display:flex; flex-direction:column; align-items:center}
    .info-section{flex:0 0 300px; display:flex; flex-direction:column; gap:1.5rem}
    
    .chess-board{
      display:grid; grid-template-columns:repeat(8,1fr); gap:0;
      width:min(90vw,500px); aspect-ratio:1; border:3px solid var(--gold); border-radius:8px; overflow:hidden;
      box-shadow:0 10px 40px rgba(0,0,0,0.5); transform:rotate(0deg); transition:transform 0.4s ease;
    }    .chess-board.flipped { transform:rotate(180deg); }
    .square{
      display:flex; align-items:center; justify-content:center; font-size:clamp(1.5rem,4vw,3rem);
      cursor:pointer; transition:all 0.2s ease; user-select:none; position:relative;
    }
    .square.light{background:var(--square-light); color:#1a1a1a}
    .square.dark{background:var(--square-dark); color:#f0f0f0}
    .square.selected{box-shadow:inset 0 0 0 3px var(--gold); z-index:2}
    .square.valid-move::after{
      content:''; position:absolute; width:30%; height:30%; border-radius:50%;
      background:var(--valid-move);
    }
    .square.valid-move.has-piece::after{
      width:90%; height:90%; border:3px solid var(--valid-move); background:transparent; border-radius:50%;
    }
    .square.last-move{background:var(--last-move)!important}
    .square:hover{filter:brightness(1.1)}
    .square.piece{cursor:grab}
    .square.piece:active{cursor:grabbing}
    
    .info-panel{padding:1.5rem}
    .info-item{display:flex; justify-content:space-between; align-items:center; padding:0.8rem 0; border-bottom:1px solid var(--glass-border)}
    .info-item:last-child{border-bottom:none}
    .info-label{color:var(--text-gray)}
    .info-value{font-weight:600; color:var(--gold)}
    
    .action-buttons{display:flex; flex-direction:column; gap:0.8rem; padding:1.5rem}
    .btn-game{
      padding:0.9rem; border:2px solid var(--gold); background:transparent; color:var(--gold);
      border-radius:12px; font-weight:600; cursor:pointer; transition:all 0.3s ease; font-size:1rem;
    }
    .btn-game:hover{background:var(--gold); color:var(--bg-dark); transform:translateY(-2px); box-shadow:0 5px 20px rgba(255,215,0,0.3)}
    .btn-game.reset{border-color:#dc3545; color:#dc3545}
    .btn-game.reset:hover{background:#dc3545; color:white; box-shadow:0 5px 20px rgba(220,53,69,0.3)}
    
    .game-status{
      padding:1rem 1.5rem; text-align:center; font-weight:500; border-radius:12px;
      margin:0 1.5rem; background:rgba(255,215,0,0.1); border:1px solid var(--gold);
    }
    .game-status.check{background:rgba(220,53,69,0.2); border-color:#dc3545; color:#ff6b6b; animation:pulse 1s infinite}
    .game-status.checkmate{background:rgba(40,167,69,0.2); border-color:#28a745; color:#51cf66; font-weight:700}
    @keyframes pulse{0%,100%{opacity:1} 50%{opacity:0.7}}
    
    .timer{font-family:monospace; font-size:1.3rem; font-weight:700; color:var(--gold)}
    
    footer{padding:2rem; text-align:center; border-top:1px solid var(--glass-border); margin-top:2rem}
    .copyright{color:var(--text-gray); font-size:0.9rem}
    
    @media(max-width:991px){
      .game-container{flex-direction:column; align-items:center}      .info-section{width:100%; max-width:500px; flex-direction:row; flex-wrap:wrap; justify-content:center}
      .info-panel,.action-buttons{flex:1 1 200px; min-width:200px}
    }
    @media(max-width:576px){
      .game-container{padding:1rem}
      .chess-board{width:min(95vw,350px)}
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html"><i class="fas fa-chess-knight"></i> ChessMaster</a>
      <button class="navbar-toggler glass" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="vs-ai.html">Play vs AI</a></li>
          <li class="nav-item"><a class="nav-link active" href="vs-player.html">Play vs Player</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="saweria.html">Saweria</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Game Container -->
  <div class="game-container">
    <div class="board-section">
      <div class="chess-board glass" id="chessboard"></div>
      <div class="game-status mt-3" id="gameStatus">Giliran: Pemain Putih</div>
    </div>
    
    <div class="info-section">
      <div class="info-panel glass">
        <div class="info-item"><span class="info-label">Giliran</span><span class="info-value" id="turnDisplay">Putih</span></div>
        <div class="info-item"><span class="info-label">Timer</span><span class="timer" id="timer">00:00:00</span></div>
        <div class="info-item"><span class="info-label">Mode</span><span class="info-value">Hot Seat 👥</span></div>
        <div class="info-item"><span class="info-label">Gerakan</span><span class="info-value" id="moveCount">0</span></div>
      </div>
      
      <div class="action-buttons glass">
        <button class="btn-game" id="flipBtn">🔄 Flip Board</button>
        <button class="btn-game" id="newGameBtn">🎮 New Game</button>
        <button class="btn-game reset" id="resetBtn">🗑️ Reset Board</button>
      </div>
    </div>  </div>

  <!-- Footer -->
  <footer class="glass mt-4">
    <p class="copyright">© 2024 ChessMaster Arena. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    // Chess Game Class for 2 Player Mode
    class ChessGame2P {
      constructor(boardEl, statusEl) {
        this.boardEl = boardEl;
        this.statusEl = statusEl;
        this.flipped = false;
        this.resetGame();
      }
      
      resetGame() {
        this.board = [
          ['♜','♞','♝','♛','♚','♝','♞','♜'],
          ['♟','♟','♟','♟','♟','♟','♟','♟'],
          [null,null,null,null,null,null,null,null],
          [null,null,null,null,null,null,null,null],
          [null,null,null,null,null,null,null,null],
          [null,null,null,null,null,null,null,null],
          ['♙','♙','♙','♙','♙','♙','♙','♙'],
          ['♖','♘','♗','♕','♔','♗','♘','♖']
        ];
        this.currentTurn = 'white';
        this.selectedPiece = null;
        this.validMoves = [];
        this.lastMove = null;
        this.moveCount = 0;
        this.gameOver = false;
        this.renderBoard();
        this.updateStatus();
      }
      
      getPieceAt(r,c) { return (r>=0&&r<8&&c>=0&&c<8) ? this.board[r][c] : null; }
      isWhitePiece(p) { return p && '♔♕♖♗♘♙'.includes(p); }
      isBlackPiece(p) { return p && '♚♛♜♝♞♟'.includes(p); }
      getPieceColor(p) {
        if(!p) return null;
        if(this.isWhitePiece(p)) return 'white';
        if(this.isBlackPiece(p)) return 'black';
        return null;
      }
      getPieceType(p) {        const t = {'♙':'pawn','♟':'pawn','♘':'knight','♞':'knight','♗':'bishop','♝':'bishop','♖':'rook','♜':'rook','♕':'queen','♛':'queen','♔':'king','♚':'king'};
        return t[p]||null;
      }
      
      getValidMoves(row,col) {
        const piece = this.board[row][col];
        if(!piece) return [];
        const color = this.getPieceColor(piece);
        if(color !== this.currentTurn) return [];
        const moves = [], type = this.getPieceType(piece);
        
        switch(type) {
          case 'pawn': this.getPawnMoves(row,col,color,moves); break;
          case 'knight': this.getKnightMoves(row,col,color,moves); break;
          case 'bishop': this.getBishopMoves(row,col,color,moves); break;
          case 'rook': this.getRookMoves(row,col,color,moves); break;
          case 'queen': this.getQueenMoves(row,col,color,moves); break;
          case 'king': this.getKingMoves(row,col,color,moves); break;
        }
        return moves;
      }
      
      getPawnMoves(r,c,color,moves) {
        const dir = color==='white' ? -1 : 1, start = color==='white' ? 6 : 1;
        if(this.isEmpty(r+dir,c)) {
          moves.push([r+dir,c]);
          if(r===start && this.isEmpty(r+2*dir,c)) moves.push([r+2*dir,c]);
        }
        for(const dc of [-1,1]) {
          const nr=r+dir, nc=c+dc;
          if(this.inBounds(nr,nc)) {
            const t=this.board[nr][nc];
            if(t && this.getPieceColor(t)!==color) moves.push([nr,nc]);
          }
        }
      }
      getKnightMoves(r,c,color,moves) {
        const offs=[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
        for(const[dr,dc] of offs) {
          const nr=r+dr, nc=c+dc;
          if(this.inBounds(nr,nc)) {
            const t=this.board[nr][nc];
            if(!t || this.getPieceColor(t)!==color) moves.push([nr,nc]);
          }
        }
      }
      getSliding(r,c,color,dirs,moves) {
        for(const[dr,dc] of dirs) {
          let nr=r+dr, nc=c+dc;
          while(this.inBounds(nr,nc)) {            const t=this.board[nr][nc];
            if(!t) moves.push([nr,nc]);
            else { if(this.getPieceColor(t)!==color) moves.push([nr,nc]); break; }
            nr+=dr; nc+=dc;
          }
        }
      }
      getBishopMoves(r,c,color,moves) { this.getSliding(r,c,color,[[-1,-1],[-1,1],[1,-1],[1,1]],moves); }
      getRookMoves(r,c,color,moves) { this.getSliding(r,c,color,[[-1,0],[1,0],[0,-1],[0,1]],moves); }
      getQueenMoves(r,c,color,moves) { this.getBishopMoves(r,c,color,moves); this.getRookMoves(r,c,color,moves); }
      getKingMoves(r,c,color,moves) {
        for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) {
          if(dr===0&&dc===0) continue;
          const nr=r+dr, nc=c+dc;
          if(this.inBounds(nr,nc)) {
            const t=this.board[nr][nc];
            if(!t || this.getPieceColor(t)!==color) moves.push([nr,nc]);
          }
        }
      }
      inBounds(r,c) { return r>=0&&r<8&&c>=0&&c<8; }
      isEmpty(r,c) { return this.inBounds(r,c) && this.board[r][c]===null; }
      
      movePiece(fr,fc,tr,tc) {
        if(this.gameOver) return false;
        const piece=this.board[fr][fc];
        if(!piece || this.getPieceColor(piece)!==this.currentTurn) return false;
        if(!this.validMoves.some(m=>m[0]===tr&&m[1]===tc)) return false;
        
        this.board[tr][tc]=piece; this.board[fr][fc]=null;
        if(this.getPieceType(piece)==='pawn' && (tr===0||tr===7)) {
          this.board[tr][tc] = this.currentTurn==='white'?'♕':'♛';
        }
        this.lastMove={from:[fr,fc],to:[tr,tc]}; this.moveCount++; this.switchTurn();
        this.renderBoard(); this.updateStatus();
        if(this.isKingCaptured()) this.endGame(this.currentTurn==='white'?'black':'white');
        return true;
      }
      
      isKingCaptured() {
        let wk=false,bk=false;
        for(let r=0;r<8;r++) for(let c=0;c<8;c++) {
          if(this.board[r][c]==='♔') wk=true;
          if(this.board[r][c]==='♚') bk=true;
        }
        return !wk||!bk;
      }
      
      switchTurn() { this.currentTurn = this.currentTurn==='white'?'black':'white'; }
            endGame(winner) {
        this.gameOver=true;
        const txt = winner==='white'?'Pemain Putih Menang! 🎉':'Pemain Hitam Menang! 🎉';
        this.statusEl.textContent=txt; this.statusEl.className='game-status checkmate mt-3';
      }
      
      renderBoard() {
        this.boardEl.innerHTML='';
        this.boardEl.className=`chess-board glass${this.flipped?' flipped':''}`;
        for(let r=0;r<8;r++) for(let c=0;c<8;c++) {
          // Adjust coordinates if flipped
          const displayR = this.flipped ? 7-r : r;
          const displayC = this.flipped ? 7-c : c;
          const piece = this.board[displayR][displayC];
          
          const sq=document.createElement('div');
          sq.className=`square ${(displayR+displayC)%2===0?'light':'dark'}`;
          sq.dataset.row=displayR; sq.dataset.col=displayC;
          
          if(piece) {
            sq.textContent=piece; sq.classList.add('piece');
            sq.style.color=this.isWhitePiece(piece)?'#1a1a1a':'#f0f0f0';
          }
          if(this.lastMove && ((this.lastMove.from[0]===displayR&&this.lastMove.from[1]===displayC)||
                              (this.lastMove.to[0]===displayR&&this.lastMove.to[1]===displayC))) {
            sq.classList.add('last-move');
          }
          if(this.selectedPiece && this.selectedPiece[0]===displayR && this.selectedPiece[1]===displayC) {
            sq.classList.add('selected');
          }
          if(this.validMoves.some(m=>m[0]===displayR&&m[1]===displayC)) {
            sq.classList.add('valid-move');
            if(piece) sq.classList.add('has-piece');
          }
          sq.addEventListener('click',()=>this.handleSquareClick(displayR,displayC));
          this.boardEl.appendChild(sq);
        }
      }
      
      handleSquareClick(r,c) {
        if(this.gameOver) return;
        const piece=this.board[r][c];
        if(this.selectedPiece) {
          if(this.validMoves.some(m=>m[0]===r&&m[1]===c)) {
            this.movePiece(this.selectedPiece[0],this.selectedPiece[1],r,c);
          }
          this.selectedPiece=null; this.validMoves=[]; this.renderBoard();
        } else if(piece && this.getPieceColor(piece)===this.currentTurn) {
          this.selectedPiece=[r,c]; this.validMoves=this.getValidMoves(r,c); this.renderBoard();
        }      }
      
      updateStatus() {
        const turnText=this.currentTurn==='white'?'Pemain Putih':'Pemain Hitam';
        document.getElementById('turnDisplay').textContent=this.currentTurn==='white'?'Putih':'Hitam';
        document.getElementById('moveCount').textContent=Math.ceil(this.moveCount/2);
        if(!this.gameOver) {
          this.statusEl.textContent=`Giliran: ${turnText}`;
          this.statusEl.className='game-status mt-3';
        }
      }
      
      flipBoard() {
        this.flipped=!this.flipped;
        this.renderBoard();
      }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded',function() {
      window.addEventListener('scroll',()=>{
        document.querySelector('.navbar').classList.toggle('scrolled',window.scrollY>50);
      });
      
      const game=new ChessGame2P(document.getElementById('chessboard'),document.getElementById('gameStatus'));
      
      document.getElementById('flipBtn').addEventListener('click',()=>game.flipBoard());
      document.getElementById('newGameBtn').addEventListener('click',()=>{
        if(confirm('Mulai permainan baru?')) game.resetGame();
      });
      document.getElementById('resetBtn').addEventListener('click',()=>{
        if(confirm('Reset papan ke posisi awal?')) game.resetGame();
      });
      
      let sec=0;
      setInterval(()=>{
        const h=String(Math.floor(sec/3600)).padStart(2,'0');
        const m=String(Math.floor((sec%3600)/60)).padStart(2,'0');
        const s=String(sec%60).padStart(2,'0');
        document.getElementById('timer').textContent=`${h}:${m}:${s}`;
        sec++;
      },1000);
    });
  </script>
</body>
